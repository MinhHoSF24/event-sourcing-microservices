server:
    port: 9000

spring:
    application:
        name: gateway-service
    cloud:
        gateway:
            discover:
                locator:
                    enabled: true
            routes:
                - id: employeeservice
                  uri: http://localhost:9002
                  predicates:
                      - Path=/api/v1/employees/**
                - id: bookservice
                  uri: http://localhost:9001
                  predicates:
                      - Path=/api/v1/books/**

eureka:
    instance:
        hostname: localhost
    client:
        service-url:
            defaultZone: http://localhost:8761/eureka
        register-with-eureka: true
        fetch-registry: true
